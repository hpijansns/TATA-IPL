<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Seats</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .qty-bubbles { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin: 20px 0; min-height: 40px; }
        .qty-bubble { width: 35px; height: 35px; border: 1px solid #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; color: #333; }
        .qty-bubble.active { background: #f84464; color: white; border-color: #f84464; }
        .venue-container { width: 100%; height: 200px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; }
        #venue-img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body class="mobile-layout bg-white">

    <header class="bms-header">
        <div class="header-left">
            <span class="back-icon" onclick="window.history.back()">&#8249;</span>
            <h1 id="match-title">Select Seats</h1>
        </div>
    </header>

    <div class="venue-container">
        <img id="venue-img" src="" alt="Venue Layout">
    </div>

    <div id="seat-popup" class="seat-popup active" style="position: relative; padding: 20px; text-align: center;">
        <div class="timer-banner" style="background: #fff8e1; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 12px;">
            You have <strong>approximately 4 minutes</strong> to select your seats.
        </div>

        <h2>How many seats?</h2>

        <img id="vehicle-img" src="https://in.bmscdn.com/webin/common/icons/bicycle.png" style="width:100px; margin: 20px auto; display:block;">

        <div id="qty-bubbles" class="qty-bubbles"></div>

        <button id="confirm-btn" class="btn-primary" style="width: 100%; background: #f84464; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 20px;">
            Select Seats
        </button>
    </div>

    <script type="module" src="js/seats.js"></script>
</body>
</html>
