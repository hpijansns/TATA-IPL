<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Select Seats</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="mobile-layout bg-white">

<header class="bms-header">
    <div class="header-left">
        <span class="back-icon">&#8249;</span>
        <h1 class="truncate-title">KOLKATA KNIGHT RIDERS VS...</h1>
    </div>
</header>

<!-- TIMER -->
<div class="timer-banner">
    You have <strong>approximately 4 minutes</strong> to select your seats.
</div>

<!-- STADIUM -->
<div class="stadium-bg"></div>

<!-- MAIN -->
<div class="qty-container">

    <h2>How many seats?</h2>

    <!-- IMAGE -->
    <div class="cycle-img">
        <img id="vehicle-img"
        src="https://in.bmscdn.com/webin/common/icons/bicycle.png">
    </div>

    <!-- NUMBERS -->
    <div class="qty-bubbles" id="qty-bubbles"></div>

    <!-- INFO -->
    <div class="info-pill">
        You can add upto 10 tickets.
    </div>

</div>

<!-- BUTTON -->
<div class="bottom-fixed-btn">
    <button class="btn-primary">Select Seats</button>
</div>

<script src="js/seats.js"></script>

</body>
</html>
