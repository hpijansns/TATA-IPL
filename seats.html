<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Seats</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="mobile-layout bg-white">

    <header class="bms-header">
        <div class="header-left">
            <span class="back-icon" onclick="window.history.back()">&#8249;</span>
            <h1 id="match-title">Loading Match...</h1>
        </div>
    </header>

    <div class="venue-container" style="background: #f0f0f0; min-height: 250px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
        <img id="venue-img" src="" alt="Stadium Layout" style="width:100%; height:auto; display: block; object-fit: contain;">
    </div>

    <div class="sticky-footer">
        <div class="price-info">
            <div id="display-price" class="price">₹0 onwards</div>
            <div class="status">Filling Fast</div>
        </div>
        <button id="open-seat-popup" class="book-now-btn">Select Seats</button>
    </div>

    <div id="seat-popup" class="seat-popup">
        <div class="popup-content">
            <div class="timer-banner">Select number of tickets</div>
            <h2>How many seats?</h2>
            <img id="vehicle-img" src="https://in.bmscdn.com/webin/common/icons/bicycle.png" style="width:120px; margin: 15px auto; display:block;">
            <div id="qty-bubbles" class="qty-bubbles"></div>
            <button id="confirm-btn" class="btn-primary">Confirm Seats</button>
        </div>
    </div>

    <script type="module" src="js/seats.js"></script>
</body>
</html>
