<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Seats | TATA IPL 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .venue-container { width: 100%; background: #f9f9f9; min-height: 250px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border-radius: 15px; border: 1px solid #eee; position: relative; }
        #venue-img { width: 100%; height: auto; max-height: 300px; object-fit: contain; display: none; }
        .venue-container::after { content: 'STADIUM VIEW'; position: absolute; bottom: 10px; right: 10px; font-size: 10px; background: rgba(0,0,0,0.5); color: #fff; padding: 2px 8px; border-radius: 4px; }

        .type-card { background: #efefef; border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .type-card.selected { border-color: #f84464; background: #fff5f7; box-shadow: 0 4px 12px rgba(248,68,100,0.1); }
        .type-card h3 { margin: 0; font-size: 16px; color: #444; }
        .type-card p { margin: 5px 0 0; font-weight: 700; color: #222; }

        .summary-card { background: #fff; border-radius: 15px; padding: 20px; margin-top: 25px; border: 1px solid #eee; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .qty-box { display: flex; align-items: center; gap: 15px; }
        .q-btn { width: 35px; height: 35px; border-radius: 50%; border: none; background: #e0e0e0; font-weight: bold; font-size: 20px; cursor: pointer; }
        .total-row { border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px; color: #f84464; font-weight: 800; font-size: 20px; display: flex; justify-content: space-between; }

        .trust-badges { display: flex; justify-content: center; gap: 20px; margin-top: 30px; opacity: 0.6; }
        .trust-badges img { height: 25px; }
        
        .final-proceed-btn { width: 100%; padding: 18px; background: #ccc; color: #fff; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; margin-top: 20px; cursor: not-allowed; transition: 0.3s; }
        .final-proceed-btn.active { background: #f84464; cursor: pointer; box-shadow: 0 5px 15px rgba(248,68,100,0.3); }
    </style>
</head>
<body class="mobile-layout bg-white" style="padding: 15px;">

    <header class="bms-header" style="margin-bottom: 15px;">
        <span class="back-icon" onclick="window.history.back()">&#8249;</span>
        <h1 id="match-title" style="font-size: 18px; margin-left: 10px;">Loading Match...</h1>
    </header>

    <div class="venue-container">
        <img id="venue-img" src="" alt="Stadium Layout">
    </div>

    <h2 style="font-size: 18px; margin-bottom: 15px;">Select Seat Type</h2>

    <div class="seat-types">
        <div class="type-card" onclick="setSeat('General Stand', 800, this)"><h3>General Stand</h3><p>₹800</p></div>
        <div class="type-card" onclick="setSeat('Upper Tier', 1200, this)"><h3>Upper Tier</h3><p>₹1200</p></div>
        <div class="type-card" onclick="setSeat('Premium Stand', 2500, this)"><h3>Premium Stand</h3><p>₹2500</p></div>
        <div class="type-card" onclick="setSeat('VIP Box', 5000, this)"><h3>VIP Box</h3><p>₹5000</p></div>
        <div class="type-card" onclick="setSeat('Club Lounge', 8000, this)"><h3>Club Lounge</h3><p>₹8000</p></div>
    </div>

    <div class="summary-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; color:#666;">
            <span>Quantity:</span>
            <div class="qty-box">
                <button class="q-btn" onclick="updateQty(-1)">-</button>
                <span id="res-qty" style="font-weight:700; font-size:18px;">1</span>
                <button class="q-btn" onclick="updateQty(1)">+</button>
            </div>
        </div>
        <div class="total-row">
            <span>Total Payable:</span>
            <span id="res-total">₹0</span>
        </div>
        <button id="final-btn" class="final-proceed-btn" disabled onclick="window.location.href='payment.html'">Continue to Checkout</button>
    </div>

    <div class="trust-badges">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/Norton_by_Symantec_logo.svg" alt="Norton">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b0/PCI_DSS_logo.svg" alt="PCI DSS">
    </div>

    <script>
        const rawData = localStorage.getItem('selectedMatch');
        if (rawData) {
            const match = JSON.parse(rawData);
            document.getElementById('match-title').innerText = match.title;
            const imgEl = document.getElementById('venue-img');
            imgEl.src = match.venue_img || match.banner;
            imgEl.style.display = 'block';
        }
    </script>
    <script type="module" src="js/seats.js"></script>
</body>
</html>
