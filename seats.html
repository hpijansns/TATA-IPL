<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Seats</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body class="mobile-layout bg-white">

<!-- 🔥 TOP HEADER -->
<header class="bms-header">
    <div class="header-left">
        <span class="back-icon">&#8249;</span>
        <h1 id="match-title">Loading...</h1>
    </div>
</header>

<!-- 🔥 VENUE IMAGE (ADMIN CONTROLLED) -->
<div class="venue-container">
    <img id="venue-img" src="" alt="Venue">
</div>

<!-- 🔥 BOOK NOW BAR -->
<div class="sticky-footer">
    <div class="price-info">
        <div class="price">₹1200 onwards</div>
        <div class="status">Filling Fast</div>
    </div>
    <button class="book-now-btn">Book Now</button>
</div>

<!-- 🔥 POPUP (FIRST SCREEN) -->
<div id="seat-popup" class="seat-popup active">

    <div class="popup-content">

        <!-- TIMER -->
        <div class="timer-banner">
            You have <strong>approximately 4 minutes</strong> to select your seats.
        </div>

        <h2>How many seats?</h2>

        <!-- IMAGE -->
        <img id="vehicle-img"
        src="https://in.bmscdn.com/webin/common/icons/bicycle.png"
        class="popup-img">

        <!-- NUMBERS -->
        <div id="qty-bubbles" class="qty-bubbles"></div>

        <div class="info-pill">
            You can add upto 10 tickets.
        </div>

        <button id="confirm-btn" class="btn-primary">
            Select Seats
        </button>

    </div>
</div>

<script type="module" src="js/seats.js"></script>

</body>
</html>
