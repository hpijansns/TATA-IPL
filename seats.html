<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Seats</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Bubbles ko dikhane ke liye emergency CSS */
        .qty-bubbles { 
            display: flex !important; 
            justify-content: center !important; 
            gap: 12px !important; 
            margin: 25px 0 !important; 
            flex-wrap: wrap;
            min-height: 40px;
        }
        .qty-bubble { 
            width: 38px !important; 
            height: 38px !important; 
            border: 1px solid #ddd; 
            border-radius: 50% !important; 
            display: flex !important; 
            align-items: center !important; 
            justify-content: center !important; 
            font-size: 15px; 
            font-weight: 700; 
            cursor: pointer; 
            background: #fff;
            color: #333;
        }
        .qty-bubble.active { 
            background: #f84464 !important; 
            color: #fff !important; 
            border-color: #f84464 !important; 
        }
    </style>
</head>
<body class="mobile-layout bg-white">

    <header class="bms-header">
        <div class="header-left">
            <span class="back-icon" onclick="window.history.back()">&#8249;</span>
            <h1 id="match-title">Loading Match...</h1>
        </div>
    </header>

    <div class="venue-container" style="background: #f0f0f0; min-height: 250px; display: flex; align-items: center; justify-content: center;">
        <img id="venue-img" src="" alt="Stadium Layout" style="width:100%; height:auto; display: none; object-fit: contain;">
    </div>

    <div class="sticky-footer">
        <div class="price-info">
            <div id="display-price" class="price">₹0 onwards</div>
            <div class="status">Filling Fast</div>
        </div>
        <button id="open-seat-popup" class="book-now-btn">Select Seats</button>
    </div>

    <div id="seat-popup" class="seat-popup active">
        <div class="popup-content">
            <div class="timer-banner">You have approximately 4 minutes to select your seats.</div>
            
            <h2 style="margin: 25px 0 10px 0; font-size: 19px;">How many seats?</h2>
            
            <div id="qty-bubbles" class="qty-bubbles"></div>

            <div class="info-pill">You can add up to 10 tickets.</div>

            <button id="confirm-btn" class="btn-primary" style="margin-top: 25px; width: 100%;">
                Continue
            </button>
        </div>
    </div>

    <script type="module" src="js/seats.js"></script>
</body>
</html>
