<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seat Selection</title>

  <link rel="stylesheet" href="/seat-selection/seat.css" />
  <link rel="stylesheet" href="/seat-selection/components/bottom-sheet.css" />
</head>

<body>
  <div class="seat-header">
    <span class="back-arrow" onclick="goBack()">&#8592;</span>
    <span class="header-title" id="headerTitle">SELECT SEATS</span>
  </div>

  <div class="top-bar">
    You have <strong>approximately 4 minutes</strong> to select your seats.
  </div>

  <div id="stadium-container">
    <svg id="stadium" viewBox="0 0 500 500">
      <circle cx="250" cy="250" r="80" fill="green" />
    </svg>
  </div>

  <div id="seatViewBack" onclick="exitSeatView()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
      <path d="M19 12H5M12 19l-7-7 7-7" />
    </svg>
  </div>

  <div id="filterPanel">
    <div class="filter-divider"></div>
    <p class="filter-heading">Please select the price-category of your choice below</p>
    <div id="price-filter" class="filter-scroll"></div>
    <p class="filter-note">Selected category's stands will get highlighted on the layout</p>
  </div>

  <div id="bottomSheetContainer"></div>

  <div id="bottomBar" style="display:none;">
    <div id="selectionPanel">
      <p id="selectionHeading">Please select seat(s) of your choice</p>
      <div id="seatInfo">
        <span id="seatCount">Selection/s :</span>
        <span id="selectionDot" aria-hidden="true"></span>
        <span id="selectionSummary">No seats selected</span>
      </div>
      <div id="paymentRow">
        <span class="payment-label">Total Payment</span>
        <span id="totalPrice">&#8377;0</span>
      </div>
    </div>
    <button id="continueBtn">Proceed</button>
  </div>

  <script src="/seat-selection/seat-data.js"></script>
  <script src="/seat-selection/seat.js"></script>
  <script src="/seat-selection/components/bottom-sheet.js"></script>

  <script>
    fetch("/seat-selection/components/bottom-sheet.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("bottomSheetContainer").innerHTML = data;

        initBottomSheet();
        openBottomSheet();
      });
  </script>
</body>

</html>
