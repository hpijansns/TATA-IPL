<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Checkout</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f9f9f9; padding: 15px; text-align: center; }
        
        .payment-container { background: #fff; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #ddd; margin-top: 10px; }
        .payment-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .payment-header h2 { margin: 0; font-size: 18px; color: #333; }
        .price-badge { background: #fff5f7; color: #f84464; padding: 8px 15px; border-radius: 8px; font-weight: 700; font-size: 18px; border: 1px solid #f84464; }

        /* 🔥 QR Image (Start mein display none rahega, bilkul seats.html ki tarah) */
        .qr-box { background: #f0f0f0; min-height: 250px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; overflow: hidden; border: 1px solid #ddd; }
        #qr-code { width: 100%; height: auto; max-width: 250px; object-fit: contain; display: none; }

        .utr-section { text-align: left; }
        .utr-label { font-size: 14px; font-weight: 600; color: #444; margin-bottom: 8px; display: block; }
        .utr-input { width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; outline: none; box-sizing: border-box; }
        .utr-input:focus { border-color: #f84464; }
        
        .pay-now-btn { width: 100%; padding: 16px; background: #ccc; color: #fff; border: none; border-radius: 10px; font-weight: 700; font-size: 16px; margin-top: 20px; cursor: not-allowed; transition: 0.3s; }
        .pay-now-btn.active { background: #f84464; cursor: pointer; }
        
        .trust-icons { margin-top: 15px; display: flex; justify-content: center; gap: 15px; opacity: 0.7; }
        .trust-icons img { height: 18px; }
    </style>
</head>
<body class="mobile-layout">

    <header class="bms-header" style="margin-bottom: 15px;">
        <span class="back-icon" onclick="window.history.back()">&#8249;</span>
        <h1 style="font-size: 18px; margin-left: 10px; display: inline;">Complete Payment</h1>
    </header>

    <div class="payment-container">
        <div class="payment-header">
            <h2>Total Payable</h2>
            <div id="p-amt" class="price-badge">₹0</div>
        </div>
        
        <p style="font-size: 14px; color: #666; margin-bottom: 15px;" id="qr-msg">Loading Secure QR...</p>

        <div class="qr-box">
            <img id="qr-code" src="" alt="UPI QR">
        </div>

        <div class="trust-icons">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/UPI-Logo.png" alt="UPI">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Paytm_Logo_%28standalone%29.svg" alt="Paytm">
        </div>

        <div class="utr-section" style="margin-top: 25px;">
            <label class="utr-label">Enter 12-digit UTR/Ref. Number</label>
            <input type="number" id="utr" class="utr-input" placeholder="Example: 4123XXXXXXXX" oninput="checkUTR()">
        </div>

        <button id="pay-btn" class="pay-now-btn" disabled onclick="location.href='processing.html'">Verify & Confirm Booking</button>
    </div>

    <script>
        // LocalStorage se Price uthao
        const finalPrice = localStorage.getItem('finalPrice') || 0;
        document.getElementById('p-amt').innerText = "₹" + finalPrice;

        // UTR Button Logic
        function checkUTR() {
            const val = document.getElementById('utr').value;
            const btn = document.getElementById('pay-btn');
            if (val.length === 12) {
                btn.disabled = false;
                btn.classList.add('active');
            } else {
                btn.disabled = true;
                btn.classList.remove('active');
            }
        }
    </script>

    <script type="module">
        import { db, ref, get } from "./js/firebase.js";

        // Same seats.html style execution
        document.addEventListener("DOMContentLoaded", async () => {
            const qrImg = document.getElementById('qr-code');
            const qrMsg = document.getElementById('qr-msg');
            const price = localStorage.getItem('finalPrice') || 0;

            try {
                const snapshot = await get(ref(db, 'settings/payment'));
                
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    let finalQR = "";
                    
                    if (data.qrUrl && data.qrUrl.trim() !== "") {
                        finalQR = data.qrUrl;
                    } else if (data.upiId && data.upiId.trim() !== "") {
                        // UPI Link ko URL-safe banaya (Aarush Fashion store name included)
                        const upiString = `upi://pay?pa=${data.upiId}&pn=AarushFashion&am=${price}&cu=INR`;
                        finalQR = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiString)}`;
                    }

                    // Agar QR URL mil gaya, toh image src dalo aur display block karo (Just like venue image)
                    if (finalQR !== "") {
                        qrImg.src = finalQR;
                        qrImg.style.display = 'block';
                        qrMsg.innerText = "Scan QR to complete your payment";
                    } else {
                        qrMsg.innerText = "Payment method not set up.";
                    }
                } else {
                    qrMsg.innerText = "QR Details missing in Admin Panel.";
                }
            } catch (error) {
                console.log("Firebase QR Load Error:", error);
                qrMsg.innerText = "Error loading QR. Try refreshing.";
            }
        });
    </script>

</body>
</html>
