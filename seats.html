<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Seats - IPL 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Agar CSS file load na ho toh ye backup styles kaam aayenge */
        .venue-container { width: 100%; background: #f0f0f0; min-height: 250px; display: flex; align-items: center; justify-content: center; }
        #venue-img { width: 100%; height: auto; max-height: 300px; object-fit: contain; display: none; }
        .qty-bubbles { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .qty-bubble { width: 40px; height: 40px; border: 1px solid #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .qty-bubble.active { background: #f84464; color: #fff; border-color: #f84464; }
    </style>
</head>
<body class="mobile-layout bg-white">

    <header class="bms-header">
        <div class="header-left">
            <span class="back-icon" onclick="window.history.back()">&#8249;</span>
            <h1 id="match-title">Loading Match...</h1>
        </div>
    </header>

    <div class="venue-container">
        <img id="venue-img" src="" alt="Stadium Layout">
    </div>

    <div class="sticky-footer">
        <div class="price-info">
            <div id="display-price" class="price">₹0 onwards</div>
            <div class="status">Filling Fast</div>
        </div>
        <button class="book-now-btn" onclick="document.getElementById('seat-popup').classList.add('active')">Select Seats</button>
    </div>

    <div id="seat-popup" class="seat-popup">
        <div class="popup-content">
            <div class="timer-banner">Select number of tickets</div>
            <h2 style="margin: 15px 0;">How many seats?</h2>
            
            <img id="vehicle-img" src="https://in.bmscdn.com/webin/common/icons/bicycle.png" style="width:100px; display:block; margin: 10px auto;">

            <div id="qty-bubbles" class="qty-bubbles"></div>

            <button class="btn-primary" onclick="document.getElementById('seat-popup').classList.remove('active')" style="margin-top: 20px; width: 100%;">
                Continue
            </button>
        </div>
    </div>

    <script type="module" src="js/seats.js"></script>

</body>
</html>
