<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Seat Type</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .seats-container { padding: 15px; background: #fff; font-family: 'Inter', sans-serif; }
        
        /* 🔥 STADIUM IMAGE BRACKET STYLE */
        .venue-frame {
            position: relative;
            padding: 10px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .venue-frame::before, .venue-frame::after {
            content: ''; position: absolute; width: 15px; height: 15px; border: 3px solid #f84464;
        }
        .venue-frame::before { top: -4px; left: -4px; border-right: 0; border-bottom: 0; border-radius: 6px 0 0 0; }
        .venue-frame::after { bottom: -4px; right: -4px; border-left: 0; border-top: 0; border-radius: 0 0 6px 0; }
        
        #venue-img { width: 100%; height: auto; border-radius: 10px; display: none; }

        /* SEAT CARDS (Gray Style) */
        .section-title { font-size: 19px; font-weight: 700; margin-bottom: 15px; color: #222; }
        .type-card {
            background: #efefef; /* Grey color like your screenshot */
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 12px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .type-card.selected { border-color: #f84464; background: #fff5f7; }
        .type-card h3 { margin: 0; font-size: 16px; color: #444; }
        .type-card p { margin: 5px 0 0; font-weight: 700; color: #333; }

        /* SUMMARY BOX */
        .summary-card { background: #f8f8f8; border-radius: 12px; padding: 15px; margin-top: 20px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px; }
        .total-row { border-top: 1px solid #ddd; padding-top: 10px; margin-top: 10px; color: #f84464; font-weight: 700; font-size: 17px; }
        
        /* QTY CONTROLS */
        .qty-box { display: flex; align-items: center; gap: 12px; }
        .q-btn { width: 30px; height: 30px; border-radius: 50%; border: none; background: #ddd; font-weight: bold; cursor: pointer; }
        
        .proceed-btn {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: #ccc; color: #fff; font-weight: 700; margin-top: 20px; cursor: not-allowed;
        }
        .proceed-btn.active { background: #f84464; cursor: pointer; }
    </style>
</head>
<body class="seats-container">

    <header class="bms-header" style="margin-bottom: 15px;">
        <span class="back-icon" onclick="window.history.back()">&#8249;</span>
        <h1 id="match-title" style="margin-left:10px; font-size:17px;">Loading...</h1>
    </header>

    <div class="venue-frame">
        <img id="venue-img" src="" alt="Stadium Map">
    </div>

    <h2 class="section-title">Select Seat Type</h2>

    <div class="seat-types">
        <div class="type-card" onclick="setSeat('General Stand', 800, this)">
            <h3>General Stand</h3>
            <p>₹800</p>
        </div>
        <div class="type-card" onclick="setSeat('Upper Tier', 1200, this)">
            <h3>Upper Tier</h3>
            <p>₹1200</p>
        </div>
        <div class="type-card" onclick="setSeat('Premium Stand', 2500, this)">
            <h3>Premium Stand</h3>
            <p>₹2500</p>
        </div>
        <div class="type-card" onclick="setSeat('VIP Box', 5000, this)">
            <h3>VIP Box</h3>
            <p>₹5000</p>
        </div>
        <div class="type-card" onclick="setSeat('Club Lounge', 8000, this)">
            <h3>Club Lounge</h3>
            <p>₹8000</p>
        </div>
    </div>

    <div class="summary-card">
        <div class="row"><span>Seat Type:</span> <span id="res-type">None</span></div>
        <div class="row"><span>Price per Ticket:</span> <span id="res-price">₹0</span></div>
        <div class="row">
            <span>Quantity:</span>
            <div class="qty-box">
                <button class="q-btn" onclick="updateQty(-1)">-</button>
                <span id="res-qty" style="font-weight:700;">1</span>
                <button class="q-btn" onclick="updateQty(1)">+</button>
            </div>
        </div>
        <div class="row total-row">
            <span>Total Payable:</span>
            <span id="res-total">₹0</span>
        </div>
    </div>

    <button id="final-btn" class="proceed-btn" disabled onclick="goNext()">Select a Seat to Continue</button>

    <script type="module" src="js/seats.js"></script>
</body>
</html>
