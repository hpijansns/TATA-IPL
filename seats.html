<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Seats - TATA IPL 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="mobile-layout bg-white">

    <header class="bms-header">
        <div class="header-left">
            <span class="back-icon" onclick="window.history.back()">&#8249;</span>
            <h1 id="match-title" class="truncate-title">Loading Match...</h1>
        </div>
    </header>

    <div class="venue-container" style="background: #f0f0f0; min-height: 200px; display: flex; align-items: center; justify-content: center;">
        <img id="venue-img" src="" alt="Stadium Layout" style="width:100%; height:auto; max-height:250px; object-fit: contain;">
    </div>

    <div class="sticky-footer">
        <div class="price-info">
            <div class="price">₹1200 onwards</div>
            <div class="status">Filling Fast</div>
        </div>
        <button id="open-seat-popup" class="book-now-btn">Book Now</button>
    </div>

    <div id="seat-popup" class="seat-popup active">
        <div class="popup-content">
            <div class="timer-banner">
                You have <strong>approximately 4 minutes</strong> to select your seats.
            </div>

            <h2>How many seats?</h2>

            <img id="vehicle-img" src="https://in.bmscdn.com/webin/common/icons/bicycle.png" class="popup-img" style="width: 120px; margin: 15px auto; display: block;">

            <div id="qty-bubbles" class="qty-bubbles"></div>

            <div class="info-pill">You can add upto 10 tickets.</div>

            <button id="confirm-btn" class="btn-primary">Select Seats</button>
        </div>
    </div>

    <script type="module" src="js/seats.js"></script>

</body>
</html>
