<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; margin: 0; padding: 20px; text-align: center; }
        .checkout-box { background: #fff; max-width: 400px; margin: auto; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .checkout-header { background: #3395ff; color: #fff; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .qr-section { padding: 30px; }
        
        /* Image default hidden rahegi jab tak load na ho */
        #qr-code { width: 220px; height: 220px; border: 8px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 10px; display: none; margin: 0 auto; object-fit: contain;}
        
        .utr-box { padding: 20px; background: #fff; border-top: 1px solid #eee; }
        .utr-input { width: 90%; padding: 15px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s; }
        .utr-input:focus { border-color: #3395ff; }
        .pay-now-btn { width: 95%; padding: 15px; background: #ccc; color: #fff; border: none; border-radius: 8px; font-weight: 700; margin-top: 15px; cursor: pointer; transition: 0.3s; }
        .pay-now-btn.active { background: #3395ff; cursor: pointer; }
    </style>
</head>
<body>

    <div class="checkout-box">
        <div class="checkout-header">
            <span style="font-weight:700;">PAYMENT GATEWAY</span>
            <span id="p-amt" style="font-size:20px; font-weight:700;">₹0</span>
        </div>
        
        <div class="qr-section">
            <p style="color:#666; font-size:14px; margin-top:0;" id="qr-msg">Loading Payment QR...</p>
            
            <img id="qr-code" src="" alt="UPI QR">
            
            <div style="margin-top:15px; display:flex; justify-content:center; align-items:center; gap:10px;">
                <img src="https://logodix.com/logo/1763538.png" height="18" alt="UPI">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Paytm_Logo_%28standalone%29.svg" height="18" alt="Paytm">
            </div>
        </div>

        <div class="utr-box">
            <input type="number" id="utr" class="utr-input" placeholder="Enter 12-digit Ref. Number (UTR)" oninput="checkUTR()">
            <button id="pay-btn" class="pay-now-btn" disabled onclick="location.href='processing.html'">PAY SECURELY</button>
        </div>
    </div>

    <script>
        function checkUTR() {
            const val = document.getElementById('utr').value;
            const btn = document.getElementById('pay-btn');
            if (val.length === 12) {
                btn.disabled = false; btn.classList.add('active');
            } else {
                btn.disabled = true; btn.classList.remove('active');
            }
        }
    </script>

    <script type="module">
        import { db, ref, get } from "./js/firebase.js";

        // Local Storage se Price Load karo
        const finalPrice = localStorage.getItem('finalPrice') || 0;
        document.getElementById('p-amt').innerText = "₹" + finalPrice;
        
        const qrImg = document.getElementById('qr-code');
        const qrMsg = document.getElementById('qr-msg');

        // Firebase ke 'settings/payment' folder se QR detail nikalo
        get(ref(db, 'settings/payment')).then((snap) => {
            if (snap.exists()) {
                const data = snap.val();
                let finalQR = "";

                if (data.qrUrl && data.qrUrl.trim() !== "") {
                    finalQR = data.qrUrl; // Direct image URL
                } else if (data.upiId && data.upiId.trim() !== "") {
                    // UPI ID se QR Generate karo (Price ke sath)
                    const upiString = `upi://pay?pa=${data.upiId}&pn=AarushFashion&am=${finalPrice}&cu=INR`;
                    finalQR = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiString)}`;
                }

                if (finalQR !== "") {
                    // Image properly load hone par hi usko dikhao aur "Loading..." text hatao
                    qrImg.onload = () => {
                        qrImg.style.display = 'block';
                        qrMsg.style.display = 'none'; 
                    };
                    qrImg.onerror = () => {
                        qrMsg.innerText = "Error loading QR Image.";
                    };
                    qrImg.src = finalQR;
                } else {
                    qrMsg.innerText = "Payment Details not added in Admin.";
                }
            } else {
                qrMsg.innerText = "No Admin payment settings found.";
            }
        }).catch(e => {
            console.error("Firebase Error:", e);
            qrMsg.innerText = "Database connection error.";
        });
    </script>
</body>
</html>
