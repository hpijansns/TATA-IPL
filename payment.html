<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; margin: 0; padding: 20px; text-align: center; }
        .checkout-box { background: #fff; max-width: 400px; margin: auto; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .checkout-header { background: #3395ff; color: #fff; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .qr-section { padding: 30px; }
        
        #qr-code { width: 220px; height: 220px; border: 8px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 10px; display: none; margin: 0 auto; object-fit: contain; }
        
        .utr-box { padding: 20px; background: #fff; border-top: 1px solid #eee; }
        .utr-input { width: 90%; padding: 15px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; outline: none; }
        .utr-input:focus { border-color: #3395ff; }
        .pay-now-btn { width: 95%; padding: 15px; background: #ccc; color: #fff; border: none; border-radius: 8px; font-weight: 700; margin-top: 15px; cursor: not-allowed; }
        .pay-now-btn.active { background: #3395ff; cursor: pointer; }
        .secured-by { margin-top: 20px; font-size: 11px; color: #aaa; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="checkout-box">
        <div class="checkout-header">
            <span style="font-weight:700;">PAYMENT GATEWAY</span>
            <span id="p-amt" style="font-size:20px; font-weight:700;">₹0</span>
        </div>
        
        <div class="qr-section">
            <p style="color:#666; font-size:14px; margin-top:0;" id="qr-msg">Loading Payment QR...</p>
            
            <img id="qr-code" src="" alt="UPI QR">

            <div style="margin-top:15px; display:flex; justify-content:center; align-items:center; gap:10px;">
                <span style="font-weight: 800; font-size: 16px; color: #333;">UPI</span>
                <span style="color:#ccc;">|</span>
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Paytm_Logo_%28standalone%29.svg" height="15" alt="Paytm">
            </div>
        </div>

        <div class="utr-box">
            <input type="number" id="utr" class="utr-input" placeholder="Enter 12-digit Ref. Number (UTR)" oninput="checkUTR()">
            <button id="pay-btn" class="pay-now-btn" disabled onclick="location.href='processing.html'">PAY SECURELY</button>
        </div>
    </div>

    <div class="secured-by">🔒 Secured by 256-bit SSL Encryption</div>

    <script>
        const finalPrice = localStorage.getItem('finalPrice') || 0;
        document.getElementById('p-amt').innerText = "₹" + finalPrice;

        function checkUTR() {
            const val = document.getElementById('utr').value;
            const btn = document.getElementById('pay-btn');
            if(val.length === 12) {
                btn.disabled = false;
                btn.classList.add('active');
            } else {
                btn.disabled = true;
                btn.classList.remove('active');
            }
        }
    </script>

    <script type="module">
        // 🔥 Yahan GET hata kar ONVALUE laga diya jo Admin me 100% chal raha hai
        import { db, ref, onValue } from "./js/firebase.js";

        const price = localStorage.getItem('finalPrice') || 0;
        const qrImg = document.getElementById('qr-code');
        const qrMsg = document.getElementById('qr-msg');

        try {
            onValue(ref(db, 'settings/payment'), (snap) => {
                if (snap.exists()) {
                    const data = snap.val();
                    let url = data.qrUrl || "";
                    let upi = data.upiId || "";

                    // Typo fix in case qhttps is still there
                    if (url.startsWith("qhttp")) {
                        url = url.replace("qhttp", "http");
                    }
                    
                    if (url !== "") {
                        qrImg.src = url;
                        qrImg.style.display = 'block';
                        qrMsg.style.display = 'none'; // Text gayab
                    } 
                    else if (upi !== "") {
                        const upiString = `upi://pay?pa=${upi}&pn=AarushFashion&am=${price}&cu=INR`;
                        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiString)}`;
                        qrImg.style.display = 'block';
                        qrMsg.style.display = 'none'; // Text gayab
                    } else {
                        qrMsg.innerText = "Payment method not added in Admin.";
                    }
                } else {
                    qrMsg.innerText = "QR Setup is incomplete. Check Admin Panel.";
                }
            }, (error) => {
                // Agar Firebase block hua toh yahan dikhega
                qrMsg.innerText = "Firebase Error: " + error.message;
            });
        } catch (err) {
            // Agar script load hone me crash hui toh yahan dikhega
            qrMsg.innerText = "Script Error: " + err.message;
        }
    </script>

</body>
</html>
