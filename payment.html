<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Checkout - TATA IPL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; margin: 0; padding: 15px; text-align: center; color: #1e293b; }
        
        .checkout-card { background: #fff; max-width: 400px; margin: auto; border-radius: 28px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        
        /* Header Section */
        .header { background: linear-gradient(135deg, #0052FF 0%, #0036b3 100%); color: #fff; padding: 25px; position: relative; }
        .amount-tag { font-size: 36px; font-weight: 800; display: block; margin-top: 5px; letter-spacing: -1px; }
        .test-badge { background: #ff4d4d; color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; position: absolute; top: 10px; right: 10px; font-weight: 800; }
        
        .qr-container { padding: 20px; background: #fafafa; border-bottom: 1px solid #eee; }
        .qr-frame { background: #fff; padding: 10px; border-radius: 20px; border: 1px solid #edf2f7; display: inline-block; }
        #qr-code { width: 180px; height: 180px; display: block; border-radius: 12px; }

        /* Payment Buttons Grid */
        .payment-methods { padding: 25px 20px; text-align: left; }
        .method-title { font-size: 14px; font-weight: 700; color: #64748b; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .pay-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 16px; border-radius: 15px; border: 1px solid #e2e8f0; background: #fff; margin-bottom: 12px; cursor: pointer; transition: 0.3s; text-decoration: none; box-sizing: border-box; }
        .pay-btn:hover { border-color: #0052FF; background: #f8fbff; transform: translateY(-2px); }
        
        .btn-left { display: flex; align-items: center; gap: 12px; }
        .btn-left img { width: 32px; height: 32px; object-fit: contain; }
        .btn-left span { font-weight: 700; font-size: 15px; color: #1e293b; }
        .arrow-right { color: #cbd5e1; font-weight: bold; }

        .any-upi { background: #111827; border: none; }
        .any-upi span { color: #fff !important; }
        .card-btn { background: #f1f5f9; border: 1px dashed #cbd5e1; }
    </style>
</head>
<body>

    <div class="checkout-card">
        <div class="header">
            <div class="test-badge">TESTING MODE</div>
            <span style="font-size: 12px; opacity: 0.8; font-weight: 700; letter-spacing: 1px;">AMOUNT TO PAY</span>
            <span class="amount-tag" id="main-amt">₹1</span>
        </div>

        <div class="qr-container">
            <p style="font-size: 12px; color: #64748b; margin-top: 0; font-weight: 600;">Scan QR to Pay</p>
            <div class="qr-frame"><img id="qr-code" src="" alt="UPI QR"></div>
        </div>

        <div class="payment-methods">
            <div class="method-title">Express Checkout</div>
            
            <a href="#" id="phonepe-link" class="pay-btn">
                <div class="btn-left">
                    <img src="https://cdn.razorpay.com/app/phonepe.svg">
                    <span>Pay with PhonePe</span>
                </div>
                <div class="arrow-right">›</div>
            </a>

            <a href="#" id="paytm-link" class="pay-btn">
                <div class="btn-left">
                    <img src="https://cdn.razorpay.com/app/paytm.svg">
                    <span>Pay with Paytm</span>
                </div>
                <div class="arrow-right">›</div>
            </a>

            <a href="#" id="universal-link" class="pay-btn any-upi">
                <div class="btn-left">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/UPI-Logo-vector.svg" style="filter: brightness(0) invert(1);">
                    <span>Pay with Any UPI App</span>
                </div>
                <div class="arrow-right" style="color:#fff">›</div>
            </a>

            <div class="method-title" style="margin-top: 20px;">Other Options</div>
            
            <div class="pay-btn card-btn" onclick="alert('Card system will be active after testing.')">
                <div class="btn-left">
                    <img src="https://img.icons8.com/color/48/000000/visa.png" style="width:24px;">
                    <img src="https://img.icons8.com/color/48/000000/mastercard.png" style="width:24px;">
                    <span>Credit / Debit Cards</span>
                </div>
                <div class="arrow-right">›</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, ref, onValue } from "./js/firebase.js";

        // 🔥 TESTING MODE: ₹1 set kiya hai
        const price = 1; 
        const name = localStorage.getItem('customerName') || "User";
        document.getElementById('main-amt').innerText = "₹" + price;

        onValue(ref(db, 'settings/payment'), (snap) => {
            if (snap.exists()) {
                const data = snap.val();
                const upiId = data.upiId || "paytm.s1h6t6g@pty";
                const customQR = data.qrUrl || "";

                const note = encodeURIComponent("IPL Ticket - " + name);
                
                // 🔥 Fixed Merchant Intent for PhonePe (No Scanner)
                const merchantIntent = `upi://pay?pa=${upiId}&pn=IPLBooking&am=${price}&cu=INR&tn=${note}&mode=02&orgid=-&sign=-`;
                
                // Set QR Image
                document.getElementById('qr-code').src = customQR ? customQR : `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(merchantIntent)}`;

                // --- Links ---
                document.getElementById('universal-link').href = merchantIntent;
                document.getElementById('phonepe-link').href = merchantIntent; // Fixed PhonePe trigger
                document.getElementById('paytm-link').href = `paytmmp://cash_wallet?pa=${upiId}&pn=Booking&am=${price}&cu=INR&tn=${note}&featuretype=money_transfer`;

                // Optional: Auto redirect to PhonePe after 5s
                setTimeout(() => {
                    // window.location.href = merchantIntent; 
                }, 5000);
            }
        });
    </script>
</body>
</html>
