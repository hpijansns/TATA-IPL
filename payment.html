<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #eef2f6; margin: 0; padding: 20px 15px; text-align: center; color: #111827; }
        
        /* Main Card */
        .checkout-box { background: #fff; max-width: 420px; margin: auto; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.06); border: 1px solid #f3f4f6; }
        .checkout-header { background: linear-gradient(135deg, #0052FF 0%, #0036b3 100%); color: #fff; padding: 24px 20px; display: flex; justify-content: space-between; align-items: center; }
        .checkout-header .title { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 6px;}
        .checkout-header .amount { font-size: 24px; font-weight: 800; }

        /* Sleek Order Summary */
        .summary-toggle { background: #f8fafc; padding: 12px 20px; font-size: 13px; font-weight: 600; color: #475569; display: flex; justify-content: space-between; cursor: pointer; border-bottom: 1px solid #e2e8f0; }
        .summary-details { display: none; background: #f8fafc; padding: 15px 20px; border-bottom: 1px solid #e2e8f0; text-align: left; font-size: 13px; color: #334155; }
        .s-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .s-total { font-weight: 700; color: #0f172a; padding-top: 8px; margin-top: 8px; border-top: 1px dashed #cbd5e1; }

        .app-links-container { display: flex; justify-content: center; gap: 25px; margin-top: 20px; padding-top: 20px; border-top: 1px dashed #e2e8f0; }
        .app-link-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; text-decoration: none; transition: 0.2s; }
        .app-link-btn img { width: 50px; height: 50px; object-fit: contain; background: #fff; padding: 5px; border-radius: 12px; border: 1px solid #e2e8f0;}
        .app-link-btn span { font-size: 13px; color: #334155; font-weight: 600; }

        .qr-section { padding: 15px 20px 25px; background: #fafafa; }
        .qr-container { position: relative; width: 200px; height: 200px; margin: 15px auto; border-radius: 16px; border: 2px solid #e2e8f0; padding: 10px; background: #fff; }
        #qr-code-img { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; }

        .upi-box { display: inline-flex; align-items: center; justify-content: center; gap: 10px; background: #fff; padding: 10px 15px; border: 1px dashed #cbd5e1; border-radius: 8px; margin-top: 10px; }
        .upi-box strong { font-size: 15px; color: #0f172a; }
        .copy-btn { background: #eff6ff; color: #0052FF; border: 1px solid #bfdbfe; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }

        /* ALL UPI BUTTON */
        .pay-now-btn { width: 100%; padding: 16px; background: #0f172a; color: #fff; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 25px; text-decoration: none; }
        .pay-now-btn:hover { background: #1e293b; }

        .redirect-msg { font-size: 14px; font-weight: 700; color: #ef4444; margin-top: 15px; background: #fee2e2; padding: 10px; border-radius: 8px; border: 1px dashed #fca5a5; }
    </style>
</head>
<body>

<div class="checkout-box">
    <div class="checkout-header">
        <span class="title">SECURE PAY</span>
        <span id="p-amt" class="amount">₹0</span>
    </div>

    <div class="summary-toggle" onclick="toggleSummary()">
        <span>View Order Summary</span>
        <span id="arrow">▼</span>
    </div>
    <div class="summary-details" id="summary-details">
        <div class="s-row"><span>Item:</span><span id="s-match">Loading...</span></div>
        <div class="s-row s-total"><span>Total Payable:</span><span id="s-total">₹0</span></div>
    </div>
    
    <div class="qr-section">
        <p style="color:#64748b; font-size:14px; margin-top:0; font-weight:600;">Amount to pay: <span id="final_paid_price" style="color:#00cf7f; font-weight: 800; font-size: 16px;">₹0</span></p>
        
        <div class="redirect-msg" id="redirect-box">
            Redirecting to PhonePe in <span id="redir-timer">5</span>s... ⏳
        </div>

        <div class="qr-container">
            <img id="qr-code-img" src="" alt="UPI QR Code">
        </div>

        <div class="upi-box">
            <input type="hidden" id="upiID" value="">
            <strong id="upi-text">Loading...</strong>
            <button onclick="copyUPI()" class="copy-btn" id="copy-btn-text">COPY</button>
        </div>

        <div class="app-links-container">
            <a id="phonepe-link" href="#" class="app-link-btn">
                <img alt="PhonePe" src="https://cdn.razorpay.com/app/phonepe.svg">
                <span>PhonePe</span>
            </a>
            <a id="paytm-link" href="#" class="app-link-btn">
                <img alt="Paytm" src="https://cdn.razorpay.com/app/paytm.svg">
                <span>Paytm</span>
            </a>
        </div>

        <a id="all-upi-link" href="#" class="pay-now-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            PAY WITH ANY UPI APP
        </a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 🔴 IMPORTANT: YAHAN APNI FIREBASE CONFIG DAALEIN 🔴
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Fetch Price & Name from URL/Storage
    const urlParams = new URLSearchParams(window.location.search);
    const finalPrice = Number(urlParams.get('price') || localStorage.getItem('finalPrice') || 0);
    const productName = urlParams.get('item') || "Online Order";

    document.getElementById('p-amt').innerText = "₹" + finalPrice;
    document.getElementById('s-match').innerText = productName;
    document.getElementById('s-total').innerText = "₹" + finalPrice;
    document.getElementById('final_paid_price').innerText = "₹" + finalPrice;

    // Firebase live data listener
    const upiRef = ref(db, 'adminSettings/activeUPI');
    onValue(upiRef, (snapshot) => {
        let liveUpiId = snapshot.val() || "default@upi"; // Default UPI agar db me kuch na ho
        generateLinks(liveUpiId);
    });

    // Generate Links Function
    function generateLinks(upiId) {
        document.getElementById("upiID").value = upiId;
        document.getElementById("upi-text").innerText = upiId;
        
        let pn = "My Store";
        let tn = "Payment for " + productName;

        if (finalPrice > 0) {
            const upiPayUrl = "upi://pay?pa=" + encodeURIComponent(upiId) + "&pn=" + encodeURIComponent(pn) + "&am=" + finalPrice + "&cu=INR&tn=" + encodeURIComponent(tn);
            document.getElementById("qr-code-img").src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(upiPayUrl);
            
            // "Pay with Any UPI App" link set
            document.getElementById("all-upi-link").href = upiPayUrl;
        }

        // PhonePe Link
        const phonepePayload = { contact: { vpa: upiId, type: "VPA" }, p2pPaymentCheckoutParams: { note: tn, isByDefaultKnownContact: true, initialAmount: finalPrice * 100, currency: "INR", checkoutType: "DEFAULT", transactionContext: "p2p" }};
        const phonepeLink = "phonepe://native?data=" + encodeURIComponent(btoa(JSON.stringify(phonepePayload))) + "&id=p2ppayment";
        document.getElementById("phonepe-link").href = phonepeLink;

        // Paytm Link
        document.getElementById("paytm-link").href = "paytmmp://cash_wallet?pa=" + encodeURIComponent(upiId) + "&pn=" + encodeURIComponent(pn) + "&am=" + finalPrice + "&cu=INR&tn=" + encodeURIComponent(tn) + "&featuretype=money_transfer";

        // Auto Redirect Logic
        startAutoRedirect(phonepeLink);
    }

    let redirectStarted = false;
    function startAutoRedirect(redirectUrl) {
        if(redirectStarted) return; // Prevent multiple countdowns
        redirectStarted = true;
        
        let timeLeft = 5;
        const timerSpan = document.getElementById("redir-timer");
        
        const countdown = setInterval(() => {
            timeLeft--;
            timerSpan.innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById("redirect-box").innerHTML = "Opening PhonePe... 🚀";
                window.location.href = redirectUrl; // REDIRECT HERE
            }
        }, 1000);
    }
</script>

<script>
    function toggleSummary() {
        const details = document.getElementById('summary-details');
        details.style.display = details.style.display === 'block' ? 'none' : 'block';
    }
    function copyUPI() {
        const copyText = document.getElementById("upiID").value;
        navigator.clipboard.writeText(copyText).then(() => {
            const btn = document.getElementById('copy-btn-text');
            btn.innerText = "COPIED!"; btn.style.background = "#00cf7f"; btn.style.color = "#fff";
            setTimeout(() => { btn.innerText = "COPY"; btn.style.background = "#eff6ff"; btn.style.color = "#0052FF"; }, 2000);
        });
    }
</script>
</body>
</html>
