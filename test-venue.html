<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venue Image Test Page</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            text-align: center; 
            background: #f4f4f4; 
        }
        .venue-test-container { 
            max-width: 500px; 
            margin: 30px auto; 
            border: 2px solid #ccc; 
            padding: 20px; 
            border-radius: 10px; 
            background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { font-size: 20px; color: #333; }
        p { font-size: 14px; color: #666; margin-bottom: 20px; }
        #test-venue-img { 
            width: 100%; 
            height: auto; 
            display: none; /* JS will show it */
            border: 1px solid #ddd; 
            margin-top: 20px; 
            border-radius: 8px;
            object-fit: contain;
            max-height: 300px;
        }
        #error-message { color: red; display: none; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="venue-test-container">
        <h1>Stadium Image Test</h1>
        <p>Match Title: <strong id="test-match-title">Loading...</strong></p>
        <p>Yeh page sirf test karega ki stadium ki image (venue_img) `localStorage` se sahi load ho rahi hai ya nahi.</p>
        
        <img id="test-venue-img" src="" alt="Stadium Layout Test">
        
        <p id="error-message"></p>
    </div>

    <script type="module" src="js/test-venue.js"></script>

</body>
</html>
