<html lang="en">

    <title>Match Details</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<body class="mobile-layout">

    <header class="bms-header white-header">
        <div class="header-left">
            <span class="back-icon" onclick="window.history.back()">&#8249;</span>
        </div>
        <div class="header-right">
            <span class="share-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2">
                    <circle cx="18" cy="5" r="3"></circle>
                    <circle cx="6" cy="12" r="3"></circle>
                    <circle cx="18" cy="19" r="3"></circle>
                </svg>
            </span>
        </div>
    </header>

    <main id="event-container" class="event-wrapper" style="padding-bottom: 90px;">
        <div class="loading">Loading details...</div>
    </main>

    <!-- T&C MODAL -->
    <div id="tnc-modal" class="modal">
        <div class="modal-content text-left tnc-box">
            <h3>Important Note</h3>
            <div class="tnc-list">
                <p>- Seated Event!</p>
                <p>- Seat numbers random allot honge</p>
                <p>- No Re-entry allowed</p>
            </div>
            <button id="accept-tnc-btn" class="btn-primary">Okay, Got It</button>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="sticky-footer" id="event-footer" style="display:none;">
        <div class="price-info">
            <div class="price" id="event-price">₹0 onwards</div>
            <div class="status">Filling Fast</div>
        </div>
        <button id="book-now-btn" class="book-now-btn">Book Now</button>
    </div>

    <!-- 🔥 IMPORTANT CHANGE -->
    <script type="module" src="js/event.js"></script>

</body>
</html>
